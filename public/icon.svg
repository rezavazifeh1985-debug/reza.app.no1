<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b6f0" />
      <stop offset="100%" stop-color="#102a4a" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#102a4a" />
  <!-- Hexagon Ring -->
  <polygon points="256,70 416,162 416,350 256,442 96,350 96,162" fill="none" stroke="#00b6f0" stroke-width="16" stroke-linejoin="round" opacity="0.4" />
  <!-- Inner Geometric Wings / Crown representing holding power and growth -->
  <g filter="url(#glow)">
    <path d="M256,130 L370,230 L330,360 L256,310 L182,360 L142,230 Z" fill="url(#brand-grad)" />
    <polygon points="256,180 320,240 256,360 192,240" fill="#ffffff" opacity="0.9" />
    <circle cx="256" cy="256" r="28" fill="#00b6f0" />
  </g>
</svg>
